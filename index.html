<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Canvas Pro</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <h1 class="app-title">Infinity Canvas Pro</h1>
            </div>
            <div class="header-center">
                <div class="zoom-controls">
                    <button class="zoom-btn" id="zoom-out" title="Zoom Out (-)">−</button>
                    <input type="range" id="zoom-slider" min="10" max="500" value="100" class="zoom-slider">
                    <span id="zoom-percentage">100%</span>
                    <button class="zoom-btn" id="zoom-in" title="Zoom In (+)">+</button>
                    <button class="zoom-btn" id="zoom-fit" title="Fit to View (Ctrl+0)">⊡</button>
                </div>
            </div>
            <div class="header-right">
                <button class="header-btn" id="save-btn" title="Save Project (Ctrl+S)">💾 Save</button>
                <button class="header-btn" id="export-btn" title="Export Project">📥 Export</button>
                <button class="header-btn" id="theme-toggle" title="Toggle Theme (D)">🌙</button>
                <button class="header-btn" id="menu-btn" title="Menu">☰</button>
            </div>
            <div class="save-indicator"></div>
        </header>
        
        <div class="main-content">
            <!-- Sidebar (Tools) -->
            <aside class="sidebar">
                <div class="toolbar" id="toolbar">
                    <!-- Tools will be generated by JS -->
                </div>
                
                <div class="divider"></div>
                
                <div class="sidebar-section">
                    <h3 class="section-title">Layers</h3>
                    <div class="layers-panel" id="layers-panel">
                        <!-- Layers will be listed here -->
                    </div>
                </div>
                
                <div class="divider"></div>
                
                <div class="sidebar-section">
                    <h3 class="section-title">Keyboard Shortcuts</h3>
                    <div class="shortcuts-panel">
                        <div class="shortcut-item">
                            <kbd>V</kbd> <span>Select</span>
                        </div>
                        <div class="shortcut-item">
                            <kbd>R</kbd> <span>Rectangle</span>
                        </div>
                        <div class="shortcut-item">
                            <kbd>C</kbd> <span>Circle</span>
                        </div>
                        <div class="shortcut-item">
                            <kbd>T</kbd> <span>Text</span>
                        </div>
                        <div class="shortcut-item">
                            <kbd>N</kbd> <span>Sticky Note</span>
                        </div>
                        <div class="shortcut-item">
                            <kbd>Ctrl+Z</kbd> <span>Undo</span>
                        </div>
                        <div class="shortcut-item">
                            <kbd>Ctrl+Shift+Z</kbd> <span>Redo</span>
                        </div>
                        <div class="shortcut-item">
                            <kbd>D</kbd> <span>Toggle Theme</span>
                        </div>
                    </div>
                </div>
            </aside>
            
            <!-- Canvas Area -->
            <div class="canvas-container">
                <canvas id="canvas"></canvas>
                <div class="canvas-overlay" id="canvas-overlay"></div>
            </div>
            
            <!-- Properties Panel -->
            <aside class="properties-panel" id="properties-panel">
                <h3 class="section-title">Properties</h3>
                <!-- Properties will be populated when shapes are selected -->
            </aside>
        </div>
        
        <!-- Mini Map -->
        <div class="minimap-container">
            <canvas id="minimap" class="minimap-canvas"></canvas>
        </div>
    </div>
    
    <!-- Load utility files -->
    <script src="js/utils/math.js"></script>
    <script src="js/utils/geometry.js"></script>
    <script src="js/utils/dom.js"></script>
    <script src="js/utils/events.js"></script>
    <script src="js/utils/performance.js"></script>
    
    <!-- Load config files -->
    <script src="js/config/constants.js"></script>
    <script src="js/config/colors.js"></script>
    <script src="js/config/shortcuts.js"></script>
    
    <!-- Load core engine -->
    <script src="js/core/History.js"></script>
    <script src="js/core/InputHandler.js"></script>
    <script src="js/core/Renderer.js"></script>
    <script src="js/core/Canvas.js"></script>
    
    <!-- Load models -->
    <script src="js/models/Shape.js"></script>
    <script src="js/models/Rectangle.js"></script>
    <script src="js/models/Circle.js"></script>
    <script src="js/models/Line.js"></script>
    <script src="js/models/Text.js"></script>
    <script src="js/models/StickyNote.js"></script>
    <script src="js/models/Document.js"></script>
    
    <!-- Load tool system -->
    <script src="js/tools/ToolManager.js"></script>
    <script src="js/tools/Tool.js"></script>
    <script src="js/tools/SelectionTool.js"></script>
    <script src="js/tools/RectangleTool.js"></script>
    <script src="js/tools/CircleTool.js"></script>
    <script src="js/tools/TextTool.js"></script>
    <script src="js/tools/StickyNoteTool.js"></script>
    
    <!-- Load managers -->
    <script src="js/ui/UIManager.js"></script>
    <script src="js/managers/StorageManager.js"></script>
    
    <!-- Load main application -->
    <script src="js/app.js"></script>
</body>
</html>
