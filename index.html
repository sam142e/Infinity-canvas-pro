<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Infinity Canvas Pro - The Ultimate Infinite Visual Workspace">
    <title>Infinity Canvas Pro</title>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/ui-components.css">
    <link rel="stylesheet" href="css/canvas.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div id="app" class="app-container" data-theme="light">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <h1 class="app-title">
                    <span class="logo-icon">∞</span>
                    Infinity Canvas Pro
                </h1>
            </div>
            
            <div class="header-right">
                <button class="btn-icon" id="theme-toggle" title="Toggle theme (D)" aria-label="Toggle dark mode">
                    <svg class="icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
                <span class="save-indicator" id="save-indicator">All changes saved</span>
            </div>
        </header>
        
        <!-- Main Container -->
        <div class="main-container">
            <!-- Toolbar -->
            <aside class="toolbar">
                <!-- Selection -->
                <div class="toolbar-group">
                    <button class="toolbar-btn active" data-tool="select" title="Selection Tool (V)" aria-label="Selection tool">
                        <svg class="icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="1 4 1 10 7 10"></polyline>
                            <polyline points="23 20 23 14 17 14"></polyline>
                            <path d="M20.362 7.489L7.639 20.212A2 2 0 0 1 4.454 17.027L17.177 4.304A2 2 0 0 1 20.362 7.489z"></path>
                        </svg>
                    </button>
                </div>
                
                <!-- Divider -->
                <div class="toolbar-divider"></div>
                
                <!-- Sticky Note -->
                <div class="toolbar-group">
                    <button class="toolbar-btn" data-tool="sticky-note" title="Sticky Note (N)" aria-label="Sticky note tool">
                        <svg class="icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2"/>
                            <line x1="9" y1="3" x2="9" y2="21"></line>
                        </svg>
                    </button>
                </div>
                
                <!-- Divider -->
                <div class="toolbar-divider"></div>
                
                <!-- Shapes -->
                <div class="toolbar-group">
                    <button class="toolbar-btn" data-shape="rectangle" title="Rectangle (R)" aria-label="Rectangle tool">
                        <svg class="icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18"></rect>
                        </svg>
                    </button>
                    
                    <button class="toolbar-btn" data-shape="circle" title="Circle (C)" aria-label="Circle tool">
                        <svg class="icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="9"></circle>
                        </svg>
                    </button>
                    
                    <button class="toolbar-btn" data-shape="line" title="Line (L)" aria-label="Line tool">
                        <svg class="icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>
                
                <!-- Divider -->
                <div class="toolbar-divider"></div>
                
                <!-- Text -->
                <div class="toolbar-group">
                    <button class="toolbar-btn" data-tool="text" title="Text Tool (T)" aria-label="Text tool">
                        <svg class="icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="4 7 4 4 20 4 20 7"></polyline>
                            <line x1="9" y1="20" x2="15" y2="20"></line>
                            <line x1="12" y1="4" x2="12" y2="20"></line>
                        </svg>
                    </button>
                </div>
                
                <!-- Divider -->
                <div class="toolbar-divider"></div>
                
                <!-- Zoom Controls -->
                <div class="toolbar-group">
                    <button class="toolbar-btn" id="zoom-in" title="Zoom In (+)" aria-label="Zoom in">
                        <svg class="icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            <line x1="11" y1="8" x2="11" y2="14"></line>
                            <line x1="8" y1="11" x2="14" y2="11"></line>
                        </svg>
                    </button>
                    
                    <span class="zoom-level" id="zoom-level">100%</span>
                    
                    <button class="toolbar-btn" id="zoom-out" title="Zoom Out (-)" aria-label="Zoom out">
                        <svg class="icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            <line x1="8" y1="11" x2="14" y2="11"></line>
                        </svg>
                    </button>
                </div>
                
                <!-- Divider -->
                <div class="toolbar-divider"></div>
                
                <!-- Undo/Redo -->
                <div class="toolbar-group">
                    <button class="toolbar-btn" id="undo-btn" title="Undo (Ctrl+Z)" aria-label="Undo">
                        <svg class="icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 7v6h6"></path>
                            <path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"></path>
                        </svg>
                    </button>
                    
                    <button class="toolbar-btn" id="redo-btn" title="Redo (Ctrl+Shift+Z)" aria-label="Redo">
                        <svg class="icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 7v6h-6"></path>
                            <path d="M3 17a9 9 0 019-9 9 9 0 016 2.3l3 2.7"></path>
                        </svg>
                    </button>
                </div>
            </aside>
            
            <!-- Canvas Container -->
            <div class="canvas-wrapper">
                <canvas id="canvas" class="viewport"></canvas>
                
                <!-- Mini Map -->
                <div class="minimap-container">
                    <canvas id="minimap" class="minimap"></canvas>
                </div>
            </div>
            
            <!-- Properties Panel -->
            <aside class="properties-panel">
                <div class="panel-header">
                    <h3>Properties</h3>
                </div>
                
                <div class="panel-content" id="properties-content">
                    <p class="placeholder-text">Select an object to view properties</p>
                </div>
            </aside>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="js/config/constants.js"></script>
    <script src="js/config/colors.js"></script>
    <script src="js/config/shortcuts.js"></script>
    <script src="js/utils/math.js"></script>
    <script src="js/utils/geometry.js"></script>
    <script src="js/utils/dom.js"></script>
    <script src="js/utils/events.js"></script>
    <script src="js/utils/performance.js"></script>
    <script src="js/core/History.js"></script>
    <script src="js/models/Shape.js"></script>
    <script src="js/models/StickyNote.js"></script>
    <script src="js/models/Rectangle.js"></script>
    <script src="js/models/Circle.js"></script>
    <script src="js/models/Line.js"></script>
    <script src="js/models/Text.js"></script>
    <script src="js/models/Document.js"></script>
    <script src="js/core/Renderer.js"></script>
    <script src="js/core/InputHandler.js"></script>
    <script src="js/core/Canvas.js"></script>
    <script src="js/tools/ToolManager.js"></script>
    <script src="js/tools/SelectionTool.js"></script>
    <script src="js/tools/StickyNoteTool.js"></script>
    <script src="js/tools/ShapeTool.js"></script>
    <script src="js/tools/TextTool.js"></script>
    <script src="js/storage/StorageManager.js"></script>
    <script src="js/ui/ThemeManager.js"></script>
    <script src="js/ui/NotificationManager.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
